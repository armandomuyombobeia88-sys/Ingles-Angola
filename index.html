<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Angola AI</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #0b141a; margin: 0; height: 100vh; display: flex; flex-direction: column; color: white; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 120px; }
        .m { max-width: 80%; padding: 12px; border-radius: 15px; font-size: 1rem; }
        .bot { background: #232d36; align-self: flex-start; border-left: 4px solid #d81e05; }
        .user { background: #005c4b; align-self: flex-end; }
        
        .input-area { position: fixed; bottom: 0; width: 100%; background: #111b21; padding: 15px; display: flex; gap: 10px; box-sizing: border-box; border-top: 1px solid #333; }
        input { flex: 1; background: #2a3942; border: none; padding: 15px; border-radius: 10px; color: white; font-size: 16px; }
        .btn { background: #f8d800; color: black; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; font-size: 1rem; }
    </style>
</head>
<body>

<div id="chat-box">
    <div class="m bot"><b>Ready!</b> Send is fixed. Type 'Ola' or 'Fome' to test. I'm waiting for your <b>Verb to Be</b> lesson!</div>
</div>

<div class="input-area">
    <input type="text" id="in" placeholder="Type here..." autocomplete="off">
    <button class="btn" onclick="sendMsg()">SEND</button>
</div>

<script>
    const brain = {
        "ola": "Hello!", "bom dia": "Good morning", "boa tarde": "Good afternoon", "boa noite": "Good night",
        "obrigado": "Thank you", "por favor": "Please", "estamos juntos": "We are together",
        "fome": "Hungry", "sede": "Thirsty", "ajuda": "Help", "sim": "Yes", "nao": "No",
        "eu": "I", "voce": "You", "ele": "He", "ela": "She", "nos": "We", "eles": "They",
        "ser": "Be", "ter": "Have", "ir": "Go", "casa": "Home", "escola": "School",
        "familia": "Family", "amigo": "Friend", "bom": "Good", "mau": "Bad", "agua": "Water"
    };

    function sendMsg() {
        const input = document.getElementById('in');
        const text = input.value.trim().toLowerCase();
        if (!text) return;

        // Show user message
        addBubble(input.value, 'user');
        input.value = "";
        
        // Bot Response
        setTimeout(() => {
            const reply = brain[text];
            if (reply) {
                addBubble("🇺🇸 <b>" + reply + "</b>", 'bot');
                const s = new SpeechSynthesisUtterance(reply);
                window.speechSynthesis.speak(s);
            } else {
                addBubble("I'm ready! Paste the <b>Verb to Be</b> lesson here, brother.", 'bot');
            }
        }, 400);
    }

    function addBubble(txt, side) {
        const div = document.createElement('div');
        div.className = 'm ' + side;
        div.innerHTML = txt;
        const box = document.getElementById('chat-box');
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }
</script>

</body>
</html>
