<script>
    // Our Core 50 Dictionary (English to Portuguese)
    const dictionary = {
        "the": "o/a", "be": "ser/estar", "to": "para", "of": "de", "and": "e",
        "have": "ter", "i": "eu", "it": "isto", "for": "por", "you": "você",
        "with": "com", "on": "em", "do": "fazer", "say": "dizer", "this": "este"
    };

    // Function to make the Bot Speak with an American accent
    function speak(text) {
        const message = new SpeechSynthesisUtterance();
        message.text = text;
        
        // Find an American English voice
        const voices = window.speechSynthesis.getVoices();
        const americanVoice = voices.find(voice => voice.lang === 'en-US');
        
        if (americanVoice) {
            message.voice = americanVoice;
        }
        
        message.rate = 0.9; // Slightly slower so it's easier to learn
        message.pitch = 1.0;
        window.speechSynthesis.speak(message);
    }

    function sendMessage() {
        const input = document.getElementById("userInput");
        const container = document.getElementById("chat-container");
        const text = input.value.trim().toLowerCase();

        if (text === "") return;

        // Show User Message
        container.innerHTML += `<div class="user-msg">Tu: ${text}</div>`;

        // AI Logic: Check for words
        let foundWords = [];
        for (let word in dictionary) {
            if (text.split(/\s+/).includes(word)) {
                foundWords.push(`${word} (${dictionary[word]})`);
            }
        }

        let responseText = "";
        if (foundWords.length > 0) {
            responseText = "Great! You used: " + foundWords.join(", ");
        } else {
            responseText = "Try using common words like 'I' or 'have'.";
        }

        // Show Bot Response in UI
        container.innerHTML += `<div class="bot-msg">Teacher: ${responseText}</div>`;
        
        // MAKE THE BOT TALK
        speak(responseText);

        // Auto-scroll and clear
        input.value = "";
        container.scrollTop = container.scrollHeight;
    }
</script>
