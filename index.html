<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teacher AI</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; margin: 0; padding: 10px; height: 100vh; display: flex; flex-direction: column; }
        #chat { flex-grow: 1; border: 2px solid #ffd700; border-radius: 10px; padding: 10px; overflow-y: auto; background: #1e1e1e; margin-bottom: 10px; }
        .bot { color: #00ffcc; margin-bottom: 15px; font-size: 16px; border-left: 3px solid #ffd700; padding-left: 10px; }
        .user { color: #ffffff; margin-bottom: 15px; text-align: right; font-weight: bold; }
        .controls { display: flex; gap: 5px; padding-bottom: 10px; }
        input { flex: 1; padding: 15px; border-radius: 8px; border: none; font-size: 16px; background: #333; color: white; }
        button { padding: 15px; border: none; border-radius: 8px; font-weight: bold; }
        #sendBtn { background: #ffd700; color: black; }
        #micBtn { background: #ff4444; color: white; width: 60px; }
    </style>
</head>
<body>

    <h3 style="text-align:center; color:#ffd700; margin: 5px;">Mestre de Voz 🇦🇴🇺🇸</h3>
    
    <div id="chat">
        <div class="bot">Teacher: Tap 🎤 to speak or type below!</div>
    </div>

    <div class="controls">
        <input type="text" id="words" placeholder="Escreva ou fale...">
        <button id="micBtn" onclick="comecarOuvir()">🎤</button>
        <button id="sendBtn" onclick="processar()">SEND</button>
    </div>

    <script>
        var dicionario = {
            "the": "o", "be": "ser", "to": "para", "of": "de", "and": "e",
            "have": "ter", "i": "eu", "you": "voce", "work": "trabalhar", "speak": "falar"
        };

        // 1. VOZ (THE MOUTH)
        function falar(txt, lang) {
            window.speechSynthesis.cancel();
            var msg = new SpeechSynthesisUtterance(txt);
            msg.lang = lang;
            msg.rate = 0.8;
            window.speechSynthesis.speak(msg);
        }

        // 2. OUVIDO (THE EARS)
        var recognition;
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.lang = 'en-US'; // Escuta Inglês
            
            recognition.onresult = function(event) {
                var resultado = event.results[0][0].transcript;
                document.getElementById("words").value = resultado;
                document.getElementById("micBtn").style.background = "#ff4444";
                processar(); // Faz a tradução automática
            };
        }

        function comecarOuvir() {
            if (recognition) {
                window.speechSynthesis.cancel(); // Silencia o bot para ele poder ouvir
                recognition.start();
                document.getElementById("micBtn").style.background = "#00ff00";
            } else {
                alert("O seu iPhone não suporta voz neste navegador.");
            }
        }

        // 3. LOGICA
        function processar() {
            var campo = document.getElementById("words");
            var tela = document.getElementById("chat");
            var input = campo.value.trim().toLowerCase();
            if (input === "") return;

            tela.innerHTML += "<div class='user'>Tu: " + input + "</div>";
            
            var resEN = "I heard " + input;
            var resPT = "Eu ouvi " + input;

            if (dicionario[input]) {
                resEN = "The translation is " + dicionario[input];
                resPT = "A tradução de " + input + " é " + dicionario[input];
            }

            tela.innerHTML += "<div class='bot'><b>Teacher:</b> " + resEN + "<br>" + resPT + "</div>";
            
            falar(resEN, 'en-US');
            // Delay for Portuguese speech
            setTimeout(function(){ falar(resPT, 'pt-PT'); }, 2000);

            campo.value = "";
            tela.scrollTop = tela.scrollHeight;
        }
    </script>
</body>
</html>
