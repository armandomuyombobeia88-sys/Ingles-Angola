<script>
    // --- APP STATE & DATA ---
    const bossWords = ["POWER", "KNOWLEDGE", "EMPIRE", "FREEDOM"];
    let wordIdx = 0;
    
    // Game Progress Variables
    let userStats = {
        level: 1,
        stars: 0,
        kwanza: 5400,
        health: 3,
        mascotsUnlocked: []
    };

    // Prices as requested: Elephant easy, Albino Lion very expensive
    const shopPrices = {
        "Elephant": 2000,
        "Giraffe": 15000,
        "Palanca": 50000,
        "Albino Lion": 250000 
    };

    // --- CINEMATIC INTRO LOGIC ---
    function runIntro() {
        createParticles();
        const interval = setInterval(() => {
            document.getElementById('loader-word').innerText = bossWords[wordIdx];
            wordIdx = (wordIdx + 1) % bossWords.length;
        }, 800);

        setTimeout(() => { document.getElementById('p-fill').style.width = "100%"; }, 100);

        setTimeout(() => {
            clearInterval(interval);
            const intro = document.getElementById('intro-overlay');
            intro.style.opacity = "0";
            intro.style.transform = "scale(1.2)";
            
            setTimeout(() => {
                intro.style.display = "none";
                const menu = document.getElementById('home-menu');
                menu.style.display = "flex";
                setTimeout(() => {
                    menu.style.opacity = "1";
                    menu.style.transform = "translateY(0)";
                    updateMenuStats();
                }, 50);
            }, 600);
        }, 4500);
    }

    function createParticles() {
        for(let i=0; i<30; i++) {
            let p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.top = Math.random() * 100 + 'vh';
            document.getElementById('intro-overlay').appendChild(p);
        }
    }

    // --- NEW MISSION LOGIC (The 13 Stages) ---
    function updateMenuStats() {
        const statsEl = document.querySelector('.boss-card p');
        statsEl.innerHTML = `Level: ${userStats.level}/13 | ${userStats.kwanza} Kz | ⭐ ${userStats.stars}`;
    }

    function enterMap() {
        let type = "Standard Level";
        if ([4, 8, 11].includes(userStats.level)) type = "⚠️ BOSS LEVEL ⚠️";
        
        alert(`MISSION START: Level ${userStats.level}\nType: ${type}\nTarget: Unlock the Albino Lion!`);
        
        // Simulating Level Completion
        if(userStats.level < 13) {
            userStats.level++;
            userStats.stars += 3;
            userStats.kwanza += 500;
            updateMenuStats();
        } else {
            alert("CONGRATULATIONS! You have mastered the Luanda Core.");
        }
    }

    function openShop() {
        let message = "--- THE PALANCA SHOP ---\n";
        for (let m in shopPrices) {
            message += `${m}: ${shopPrices[m]} Kz\n`;
        }
        alert(message + `\nYour Balance: ${userStats.kwanza} Kz`);
    }

    function openRealEstate() {
        alert("Properties: T3 Apartment in Kilamba - Secured.");
    }
</script>
