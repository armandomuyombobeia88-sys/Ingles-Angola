<script>
    let xp = 0;
    // 100 MOST COMMON WORDS - Optimized
    const dictionary = [
        { pt: "o", en: "The" }, { pt: "a", en: "The" }, { pt: "ser", en: "Be" }, { pt: "para", en: "To" }, { pt: "de", en: "Of" }, 
        { pt: "e", en: "And" }, { pt: "um", en: "A" }, { pt: "em", en: "In" }, { pt: "ter", en: "Have" }, { pt: "eu", en: "I" },
        { pt: "isso", en: "It" }, { pt: "nao", en: "No / Not" }, { pt: "com", en: "With" }, { pt: "ele", en: "He" }, { pt: "ela", en: "She" }, 
        { pt: "voce", en: "You" }, { pt: "fazer", en: "Do" }, { pt: "este", en: "This" }, { pt: "mas", en: "But" }, { pt: "eles", en: "They" }, 
        { pt: "nos", en: "We" }, { pt: "dizer", en: "Say" }, { pt: "ir", en: "Go" }, { pt: "obter", en: "Get" }, { pt: "meu", en: "My" }, 
        { pt: "ver", en: "See" }, { pt: "saber", en: "Know" }, { pt: "tempo", en: "Time" }, { pt: "quem", en: "Who" }, { pt: "dar", en: "Give" },
        { pt: "quando", en: "When" }, { pt: "onde", en: "Where" }, { pt: "porque", en: "Why" }, { pt: "como", en: "How" }, { pt: "ajuda", en: "Help" }, 
        { pt: "obrigado", en: "Thank you" }, { pt: "por favor", en: "Please" }, { pt: "estamos juntos", en: "We are together" },
        { pt: "bom dia", en: "Good morning" }, { pt: "boa noite", en: "Good night" }, { pt: "fome", en: "Hungry" }, { pt: "sede", en: "Thirsty" },
        { pt: "feliz", en: "Happy" }, { pt: "triste", en: "Sad" }, { pt: "escola", en: "School" }, { pt: "trabalho", en: "Work" }, 
        { pt: "casa", en: "Home" }, { pt: "familia", en: "Family" }, { pt: "amigo", en: "Friend" }, { pt: "ola", en: "Hello" },
        { pt: "hi", en: "Hi!" }, { pt: "mambo", en: "Thing / Situation" }
    ];

    function send() {
        let input = document.getElementById('in');
        let val = input.value.trim().toLowerCase();
        if(!val) return;

        addMsg(input.value, 'user');
        input.value = "";

        setTimeout(() => {
            // FIXED SEARCH: Looks for the exact word match
            let found = dictionary.find(d => d.pt === val || d.en.toLowerCase() === val);

            if(found) {
                addMsg("🇺🇸 <b>" + found.en + "</b>", 'bot');
                speak(found.en);
                xp += 10;
                document.getElementById('xp-tag').innerText = xp + " XP";
            } else if (val.includes("aula") || val.includes("lesson")) {
                addMsg("👨‍🏫 <b>Class Alert!</b> My master is about to teach me the Verb to Be. Stay tuned!", 'bot');
            } else {
                addMsg("I don't know that word yet, brother! Try 'Ola', 'Fome', or 'Obrigado'.", 'bot');
            }
        }, 500);
    }

    function addMsg(t, s) {
        let d = document.createElement('div');
        d.className = 'm ' + s; d.innerHTML = t;
        let box = document.getElementById('chat-box');
        box.appendChild(d); box.scrollTop = box.scrollHeight;
    }

    function speak(t) {
        let s = new SpeechSynthesisUtterance(t);
        s.lang = 'en-US'; s.rate = 0.8;
        window.speechSynthesis.speak(s);
    }
</script>
