<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Angola English Teacher Pro</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #0b141a; margin: 0; display: flex; flex-direction: column; height: 100vh; color: white; }
        .header { background: #202c33; padding: 10px 15px; border-bottom: 1px solid #333; }
        .voice-selector { display: flex; gap: 5px; margin-top: 8px; overflow-x: auto; padding-bottom: 5px; }
        .v-btn { background: #333; border: 1px solid #555; color: #ccc; font-size: 0.7rem; padding: 5px 10px; border-radius: 15px; white-space: nowrap; }
        .v-btn.active { background: #00a884; color: white; border-color: #00a884; }
        
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .m { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 0.95rem; animation: fadeIn 0.3s; }
        .bot { background: #202c33; align-self: flex-start; border-top-left-radius: 0; }
        .user { background: #005c4b; align-self: flex-end; border-top-right-radius: 0; }
        
        .input-area { background: #202c33; padding: 10px; display: flex; gap: 8px; }
        input { flex: 1; background: #2a3942; border: none; padding: 12px; border-radius: 24px; color: white; outline: none; }
        button.send { background: #00a884; border: none; width: 45px; height: 45px; border-radius: 50%; color: white; font-weight: bold; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .speaking { border: 2px solid #00a884; box-shadow: 0 0 10px #00a884; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-weight: bold; color: #00a884;">Professor AI 🇦🇴</div>
    <div class="voice-selector">
        <div class="v-btn active" onclick="setVoice('us-f', this)">🇺🇸 USA (F)</div>
        <div class="v-btn" onclick="setVoice('us-m', this)">🇺🇸 USA (M)</div>
        <div class="v-btn" onclick="setVoice('uk', this)">🇬🇧 UK</div>
    </div>
</div>

<div id="chat-box">
    <div class="m bot" id="welcome">Olá, brother! Escolhe o sotaque acima e escreve uma frase.</div>
</div>

<div class="input-area">
    <input type="text" id="in" placeholder="Escreve aqui..." onkeypress="if(event.key==='Enter') send()">
    <button class="send" onclick="send()">></button>
</div>

<script>
    let selectedVoice = 'en-US'; 
    let selectedRate = 0.9; // Slightly slower for better learning

    const brain = {
        "bom dia": "Good morning!",
        "como estas": "How are you doing today?",
        "obrigado": "Thank you very much!",
        "estamos juntos": "We are together, my friend!",
        "fome": "I am starving!",
        "ajuda": "Can you help me, please?",
        "parabens": "Congratulations! Great job!",
        "boa tarde": "Good afternoon!",
        "onde ficas": "Where is it located?"
    };

    function setVoice(type, el) {
        document.querySelectorAll('.v-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        if(type === 'us-f') selectedVoice = 'en-US';
        if(type === 'us-m') selectedVoice = 'en-US'; // iPhone handles Male/Female automatically via system settings
        if(type === 'uk') selectedVoice = 'en-GB';
    }

    function send() {
        let input = document.getElementById('in');
        let text = input.value.trim();
        if(!text) return;

        addMsg(text, 'user');
        input.value = "";

        setTimeout(() => {
            let reply = "Ainda não aprendi essa, brother! Tenta 'Bom dia' ou 'Como estas'.";
            let lowerText = text.toLowerCase();

            for (let key in brain) {
                if (lowerText.includes(key)) {
                    reply = brain[key];
                    break;
                }
            }
            
            let bubble = addMsg(reply, 'bot');
            
            // SPEAK LOGIC
            if(reply.includes('!')) {
                bubble.classList.add('speaking');
                let speech = new SpeechSynthesisUtterance(reply);
                speech.lang = selectedVoice;
                speech.rate = selectedRate;
                
                // On iPhone, if you want Male/Female specifically, 
                // it usually picks based on the user's Siri voice settings.
                
                speech.onend = () => bubble.classList.remove('speaking');
                window.speechSynthesis.speak(speech);
            }
        }, 500);
    }

    function addMsg(t, s) {
        let b = document.createElement('div');
        b.className = 'm ' + s;
        b.innerText = t;
        let box = document.getElementById('chat-box');
        box.appendChild(b);
        box.scrollTop = box.scrollHeight;
        return b;
    }
</script>

</body>
</html>
