<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { font-family: -apple-system, sans-serif; background: #0b141a; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        
        /* Message Bubbles */
        .msg { max-width: 80%; padding: 12px; border-radius: 15px; font-size: 1rem; line-height: 1.4; }
        .bot { background: #202c33; color: white; align-self: flex-start; border-bottom-left-radius: 2px; }
        .user { background: #005c4b; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }

        /* Input Area */
        .input-area { background: #202c33; padding: 10px; display: flex; gap: 10px; align-items: center; }
        input { flex: 1; background: #2a3942; border: none; padding: 12px; border-radius: 20px; color: white; outline: none; }
        button { background: #00a884; border: none; color: white; padding: 10px 20px; border-radius: 20px; font-weight: bold; }
        
        .header { background: #202c33; color: #00a884; padding: 15px; text-align: center; font-weight: bold; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

<div class="header">Angola English AI 🇦🇴</div>
<div id="chat-window">
    <div class="msg bot">Olá! Eu sou o teu Chatbot de Inglês. Escreve qualquer coisa em Português e eu ensino-te como se diz em Inglês!</div>
</div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="Escreve aqui...">
    <button onclick="sendMessage()">Enviar</button>
</div>

<script>
    // Simple "Brain" for the bot
    const dictionary = {
        "oi": "Hi! In English we say: 'Hello' or 'Hi'.",
        "tudo bem": "You can say: 'How are you?' or 'I am fine'.",
        "como estas": "In English: 'How are you doing?'",
        "obrigado": "That is: 'Thank you!'",
        "mambo": "A 'mambo' can be a 'thing' or 'business' in English.",
        "fome": "Say: 'I am hungry'.",
        "estamos juntos": "We say: 'We are together' or 'I got your back!'"
    };

    function sendMessage() {
        const input = document.getElementById('userInput');
        const text = input.value.toLowerCase().trim();
        if (text === "") return;

        addMessage(input.value, 'user');
        input.value = "";

        // Bot "Thinking" delay
        setTimeout(() => {
            let reply = "Desculpa, ainda estou a aprender essa! Tenta 'Oi' ou 'Obrigado'.";
            
            // Check dictionary
            for (let key in dictionary) {
                if (text.includes(key)) {
                    reply = dictionary[key];
                }
            }
            addMessage(reply, 'bot');
        }, 600);
    }

    function addMessage(text, sender) {
        const div = document.createElement('div');
        div.className = `msg ${sender}`;
        div.innerText = text;
        const window = document.getElementById('chat-window');
        window.appendChild(div);
        window.scrollTop = window.scrollHeight;
    }
</script>

</body>
</html>
