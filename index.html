<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mestre AI - Palanca Negra</title>
    <style>
        :root { --gold: #ffd700; --dark: #050505; --card: #1a1a1a; --accent: #00ffcc; }
        * { box-sizing: border-box; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        body { background: var(--dark); color: #eee; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; height: 100vh; }

        /* LOGIN SCREEN - FIXED ANIMATION */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #000 0%, #1a1a1a 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 999; 
        }
        
        /* This class triggers when logging in */
        .hide-login { transform: translateY(-100%); opacity: 0; pointer-events: none; }

        .palanca-logo {
            font-size: 80px; margin-bottom: 10px; filter: drop-shadow(0 0 15px var(--gold));
            animation: bounce 2s infinite ease-in-out;
        }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .login-box {
            width: 85%; max-width: 350px; background: rgba(255,255,255,0.05);
            padding: 30px; border-radius: 25px; border: 1px solid rgba(255,215,0,0.3);
            backdrop-filter: blur(15px); text-align: center;
        }
        input { 
            width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; 
            border: 1px solid #333; background: #000; color: white; outline: none; font-size: 16px;
        }
        input:focus { border-color: var(--gold); }

        /* MAIN APP LAYOUT */
        #app-interface { 
            display: flex; flex-direction: column; height: 100vh; padding: 15px; 
            opacity: 0; transform: scale(0.9); 
        }
        .show-app { opacity: 1 !important; transform: scale(1) !important; }

        #chat { flex-grow: 1; border-radius: 20px; padding: 15px; overflow-y: auto; background: #0c0c0c; border: 1px solid #222; margin-bottom: 10px; }
        
        .bot-msg { display: flex; gap: 10px; margin-bottom: 15px; align-items: flex-start; animation: slideRight 0.3s forwards; }
        .mascot-icon { font-size: 30px; background: #222; padding: 5px; border-radius: 50%; border: 1px solid var(--gold); min-width: 45px; text-align: center; }
        .bubble { background: #1a1a1a; padding: 12px; border-radius: 0 15px 15px 15px; border: 1px solid #333; max-width: 80%; }
        
        .user-msg { text-align: right; color: var(--gold); margin-bottom: 15px; font-weight: bold; animation: slideLeft 0.3s forwards; }

        .row-label { font-size: 10px; color: #666; text-transform: uppercase; margin: 5px 0; letter-spacing: 1px; }
        .chip-container { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .chip-container::-webkit-scrollbar { display: none; }
        .chip { background: #222; padding: 10px 18px; border-radius: 12px; font-size: 14px; white-space: nowrap; border: 1px solid #444; cursor: pointer; }
        .chip:active { background: var(--gold); color: #000; }

        .btn-gold { background: var(--gold); color: black; border: none; padding: 15px; border-radius: 15px; font-weight: 900; width: 100%; cursor: pointer; font-size: 16px; }

        @keyframes slideRight { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideLeft { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="palanca-logo">🦌</div>
        <h2 style="color: var(--gold); letter-spacing: 2px; margin-bottom: 5px;">PALANCA MESTRE</h2>
        <p style="color: #888; margin-bottom: 20px; font-size: 12px;">UBER ENGLISH LEARNING 🇦🇴</p>
        <div class="login-box">
            <input type="text" id="username" placeholder="Teu Nome (Your Name)">
            <input type="password" placeholder="Password">
            <button class="btn-gold" onclick="login()">ENTRAR / LOGIN</button>
        </div>
    </div>

    <div id="app-interface">
        <div id="chat">
            <div class="bot-msg">
                <div class="mascot-icon">🦌</div>
                <div class="bubble"><b>Mestre Palanca:</b> Olá! Escolha os blocos para começar a falar Inglês!</div>
            </div>
        </div>

        <div style="background: #111; border-radius: 20px; padding: 10px; margin-bottom: 10px; border: 1px solid #333;">
            <div id="chip-area"></div>
        </div>

        <div style="display: flex; gap: 10px;">
            <input type="text" id="words" placeholder="Sua frase aqui..." readonly style="margin:0; background: #000;">
            <button onclick="process()" style="background:var(--gold); border:none; border-radius:12px; padding:0 25px; font-weight:bold; color: black;">SEND</button>
        </div>
    </div>

    <script>
        // Real Translation Dictionary
        const dictionary = {
            "I": "Eu", "You": "Tu", "He": "Ele", "She": "Ela", "We": "Nós",
            "am": "sou/estou", "want": "quero", "need": "preciso de", "go": "vou", "to": "para",
            "happy": "feliz", "water": "água", "work": "trabalho", "school": "escola",
            "hungry": "com fome", "now": "agora"
        };

        const wordCategories = {
            "Who (Quem)": ["I", "You", "He", "She", "We"],
            "Action (Ação)": ["am", "want", "need", "go", "to"],
            "Object/State": ["happy", "water", "work", "school", "hungry", "now"]
        };

        function login() {
            const user = document.getElementById('username').value || "Estudante";
            // 1. Hide Login Screen
            document.getElementById('login-screen').classList.add('hide-login');
            // 2. Show App Interface
            document.getElementById('app-interface').classList.add('show-app');
            
            loadChips();
        }

        function loadChips() {
            const area = document.getElementById('chip-area');
            area.innerHTML = ""; 
            for (let cat in wordCategories) {
                area.innerHTML += `<div class="row-label">${cat}</div>`;
                let row = document.createElement('div');
                row.className = "chip-container";
                wordCategories[cat].forEach(w => {
                    row.innerHTML += `<div class="chip" onclick="add('${w}')">${w}</div>`;
                });
                area.appendChild(row);
            }
        }

        function add(w) { 
            const input = document.getElementById('words');
            input.value += (input.value ? " " : "") + w; 
        }

        function process() {
            let english = document.getElementById('words').value.trim();
            if(!english) return;

            // Simple Translator Logic
            let wordsArray = english.split(" ");
            let portugueseArray = wordsArray.map(w => dictionary[w] || w);
            let portuguese = portugueseArray.join(" ");

            let chat = document.getElementById('chat');
            chat.innerHTML += `<div class="user-msg">${english}</div>`;
            
            setTimeout(() => {
                chat.innerHTML += `
                    <div class="bot-msg">
                        <div class="mascot-icon">🦌</div>
                        <div class="bubble">
                            <b style="color:var(--gold)">Tradução:</b><br>${portuguese}<br>
                            <hr style="border:0; border-top:1px solid #333; margin:8px 0;">
                            <small style="color:var(--accent)">🔊 Speaking English now...</small>
                        </div>
                    </div>`;
                chat.scrollTop = chat.scrollHeight;
                speak(english);
            }, 500);

            document.getElementById('words').value = "";
        }

        function speak(t) {
            window.speechSynthesis.cancel();
            let m = new SpeechSynthesisUtterance(t);
            m.lang = 'en-US';
            m.rate = 0.8;
            window.speechSynthesis.speak(m);
        }
    </script>
</body>
</html>
