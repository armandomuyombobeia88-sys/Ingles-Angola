<script>
    // The "Ponte" Dictionary: English to Portuguese
    const dictionary = {
        // High Frequency Core Words
        "the": "o/a", "be": "ser/estar", "to": "para", "of": "de", "and": "e",
        "a": "um/uma", "in": "em", "that": "que", "have": "ter", "i": "eu",
        "it": "isto", "for": "por", "not": "não", "on": "sobre/em", "with": "com",
        "he": "ele", "as": "como", "you": "você/tu", "do": "fazer", "at": "em/no",
        "this": "este/esta", "but": "mas", "his": "dele", "by": "por", "from": "de/desde",
        "they": "eles/elas", "we": "nós", "say": "dizer", "her": "dela", "she": "ela",
        "or": "ou", "an": "um/uma", "will": "será (futuro)", "my": "meu/minha", "one": "um",
        "all": "tudo/todos", "would": "seria", "there": "lá/ali", "their": "deles", "what": "o que"
    };

    // American Voice Logic
    function speak(text) {
        window.speechSynthesis.cancel(); 
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'en-US';
        msg.rate = 0.8; 
        window.speechSynthesis.speak(msg);
    }

    function sendMessage() {
        const input = document.getElementById("userInput");
        const container = document.getElementById("chat-container");
        const text = input.value.trim();

        if (text === "") return;

        // User Message
        container.innerHTML += `<div class="user-msg">Tu: ${text}</div>`;

        // Logic: Translation & Encouragement
        let words = text.toLowerCase().replace(/[.,/#!$%^&*;:{}=\-_`~()]/g,"").split(/\s+/);
        let found = [];
        
        words.forEach(w => {
            if(dictionary[w]) {
                found.push(`${w.toUpperCase()} (${dictionary[w]})`);
            }
        });

        let responseText = "";
        if (found.length > 0) {
            responseText = "Very good! You used: " + found.join(", ") + ". Keep practicing!";
        } else {
            responseText = "I understood. Try to use words like 'I', 'have', or 'we'. For example: 'I have a book'.";
        }

        // Display Bot Response
        container.innerHTML += `<div class="bot-msg">Teacher: ${responseText}</div>`;
        
        // Speak the English response
        speak(responseText);

        // UI cleanup
        input.value = "";
        container.scrollTop = container.scrollHeight;
    }
</script>
