<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mestre AI - Luxury Empire</title>
    <style>
        :root { 
            --gold: #ffd700; --dark: #050505; --surface: #121212; 
            --accent: #00ffcc; --legendary: #ff00ff; --rare: #0077ff; 
        }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; transition: 0.3s; }
        body { background: var(--dark); color: white; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

        header { padding: 15px 20px; background: #000; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        
        /* THE LEADERBOARD */
        #leaderboard { background: #111; padding: 10px 20px; font-size: 11px; display: flex; gap: 20px; overflow-x: auto; border-bottom: 1px solid #333; color: #888; }
        .top-user { white-space: nowrap; font-weight: bold; }
        .top-user.me { color: var(--gold); }

        /* SHOP & UI */
        #shop-overlay { position: fixed; inset: 0; z-index: 2000; background: #000; display: none; flex-direction: column; padding: 20px; overflow-y: auto; }
        .mascot-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .card { background: #1a1a1a; padding: 15px; border-radius: 20px; border: 1px solid #333; text-align: center; }
        .card.active { border-color: var(--gold); box-shadow: 0 0 15px var(--gold); }

        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .bubble { max-width: 85%; padding: 15px; border-radius: 20px; line-height: 1.4; animation: pop 0.4s ease; }
        .bot { background: var(--surface); border: 1px solid #222; align-self: flex-start; border-bottom-left-radius: 2px; }
        .user { background: var(--gold); color: #000; align-self: flex-end; border-bottom-right-radius: 2px; font-weight: 800; }

        .builder { background: var(--surface); padding: 15px; border-radius: 30px 30px 0; border-top: 1px solid #333; max-height: 55vh; overflow-y: auto; }
        .cat-label { font-size: 10px; color: #666; text-transform: uppercase; margin: 12px 0 5px; font-weight: 900; letter-spacing: 1px; }
        .chip-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .chip { background: #111; padding: 10px 16px; border-radius: 12px; border: 1px solid #333; white-space: nowrap; cursor: pointer; font-size: 13px; color: #bbb; }
        .chip:active { background: var(--gold); color: #000; }

        .input-group { display: flex; gap: 10px; background: #000; padding: 10px; border-radius: 20px; border: 1px solid #333; margin-top: 10px; }
        input { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 16px; }
        .send-btn { background: var(--gold); border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 20px; color: black; font-weight: 900; }

        @keyframes pop { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div id="shop-overlay">
        <h1 style="color:var(--gold)">MASCOT EMPIRE SHOP</h1>
        <div class="mascot-grid" id="shop-list"></div>
        <button onclick="toggleShop()" style="margin-top:20px; padding:15px; background:white; border:none; border-radius:15px; font-weight:bold; width:100%;">BACK TO STREETS</button>
    </div>

    <div id="leaderboard">
        <span class="top-user">1. Rei de Luanda (550k)</span>
        <span class="top-user">2. Rainha Fuba (410k)</span>
        <span class="top-user me">15. BOSS (YOU) - <span id="board-coins">3000</span></span>
        <span class="top-user">16. Candongueiro Pro (2800)</span>
    </div>

    <header>
        <button onclick="toggleShop()" style="background:transparent; border:none; color:white; font-size:22px;">🛍️</button>
        <div style="font-weight: 900; color: var(--gold); font-size: 18px;">💰 <span id="coins">3000</span> Kz</div>
        <div style="color:var(--accent); font-weight:800; font-size:11px;">📍 CANDONGUEIRO STOP</div>
    </header>

    <div id="chat">
        <div class="bubble bot">
            <div id="mestre-icon" style="font-size:40px;">🦌</div>
            <div><b>Mestre:</b><br>Lesson 6: <b>The Candongueiro!</b> You're in a taxi. How do you tell the driver where to go?</div>
        </div>
    </div>

    <div class="builder">
        <div class="cat-label">Taxi Directions</div>
        <div class="chip-scroll" id="row-dir"></div>
        <div class="cat-label">The Fare (O Troco)</div>
        <div class="chip-scroll" id="row-pay"></div>
        <div class="cat-label">Destinations</div>
        <div class="chip-scroll" id="row-dest"></div>

        <div class="input-group">
            <input type="text" id="main-input" placeholder="Tell the driver..." readonly>
            <button class="send-btn" onclick="process()">➔</button>
        </div>
    </div>

    <script>
        let coins = 3000;
        let inventory = { owned: ['palanca'], active: 'palanca' };
        
        const mascots = {
            palanca: { icon: '🦌', name: 'Palanca', price: 0, rarity: 'BASIC' },
            elephant: { icon: '🐘', name: 'Tank Elephant', price: 1500, rarity: 'EASY' },
            giraffe: { icon: '🦒', name: 'Scout Giraffe', price: 15000, rarity: 'ELITE' },
            lion: { icon: '🦁', name: 'Muscle Lion', price: 50000, rarity: 'ROYAL' },
            albino_lion: { icon: '⚪🦁', name: 'Albino King', price: 150000, rarity: 'LEGENDARY' }
        };

        const taxiBrain = {
            "stop here": "pára aqui", "next stop": "próxima paragem", "keep the change": "fica com o troco",
            "how much": "quanto é", "straight": "frente", "left": "esquerda", "right": "direita",
            "gas station": "bomba", "market": "mercado", "airport": "aeroporto"
        };

        const vocab = {
            dir: ["Stop here", "Next stop", "Go straight", "Turn left", "Turn right", "Pé no chão!"],
            pay: ["How much is the trip?", "Here is the money", "Keep the change", "Do you have change?"],
            dest: ["to the Airport", "to the Market", "to Mutamba", "to Talatona", "to the Hospital"]
        };

        function renderShop() {
            const list = document.getElementById('shop-list');
            list.innerHTML = "";
            for(let id in mascots) {
                const m = mascots[id];
                const owned = inventory.owned.includes(id);
                list.innerHTML += `
                    <div class="card ${inventory.active === id ? 'active' : ''}">
                        <div style="font-size:40px;">${m.icon}</div>
                        <b>${m.name}</b><br>
                        <small style="color:${m.price > 10000 ? 'var(--legendary)' : '#888'}">${m.rarity}</small><br><br>
                        ${owned ? `<button onclick="equip('${id}')">EQUIP</button>` : `<button onclick="buy('${id}')">BUY ${m.price} Kz</button>`}
                    </div>`;
            }
        }

        function buy(id) {
            if(coins >= mascots[id].price) {
                coins -= mascots[id].price;
                inventory.owned.push(id);
                renderShop();
                updateUI();
            } else { alert("Not enough Kwanza! Keep studying to earn more."); }
        }

        function equip(id) { inventory.active = id; document.getElementById('mestre-icon').innerText = mascots[id].icon; toggleShop(); }
        function toggleShop() { const s = document.getElementById('shop-overlay'); s.style.display = s.style.display === 'flex' ? 'none' : 'flex'; renderShop(); }
        function renderChips() { for(let cat in vocab) { document.getElementById('row-' + cat).innerHTML = vocab[cat].map(w => `<div class="chip" onclick="add('${w}')">${w}</div>`).join(''); } }
        function add(w) { let i = document.getElementById('main-input'); i.value += (i.value ? " " : "") + w; }

        function process() {
            let val = document.getElementById('main-input').value.trim();
            if(!val) return;
            
            let translation = val.toLowerCase();
            for(let eng in taxiBrain) { if(translation.includes(eng)) { translation = translation.replace(new RegExp(eng, 'g'), `<b>${taxiBrain[eng]}</b>`); } }

            let chat = document.getElementById('chat');
            chat.innerHTML += `<div class="user msg">${val}</div>`;
            coins += 150;
            updateUI();

            setTimeout(() => {
                chat.innerHTML += `<div class="bot bubble"><b>Mestre Candongueiro:</b><br>${translation}<br><div style="color:var(--gold); font-size:10px; margin-top:5px;">+150 Kz EARNED!</div></div>`;
                chat.scrollTop = chat.scrollHeight;
                speak(val);
            }, 600);
            document.getElementById('main-input').value = "";
        }

        function updateUI() { 
            document.getElementById('coins').innerText = coins; 
            document.getElementById('board-coins').innerText = coins;
        }
        function speak(t) { window.speechSynthesis.cancel(); let m = new SpeechSynthesisUtterance(t); m.lang = 'en-US'; window.speechSynthesis.speak(m); }

        renderChips();
        updateUI();
    </script>
</body>
</html>
