<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mestre AI - Global Edition</title>
    <style>
        :root { 
            --gold: #ffd700; --dark: #080808; --surface: #121212; 
            --present: #00ffcc; --past: #ff007f; --future: #00a2ff;
            --text: #ffffff; --sub: #a0a0a0;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--dark); color: var(--text); font-family: 'Inter', 'Segoe UI', sans-serif; 
            margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column;
        }

        /* ELITE HEADER */
        header {
            padding: 20px 20px 10px; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px);
            border-bottom: 1px solid #222; z-index: 100;
        }
        .stats-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .xp-bar-bg { width: 100%; height: 6px; background: #222; border-radius: 10px; overflow: hidden; }
        #xp-fill { width: 15%; height: 100%; background: linear-gradient(90deg, var(--gold), #fff); transition: width 0.8s ease; }
        
        .stat { font-weight: 800; font-size: 14px; display: flex; align-items: center; gap: 5px; }
        .streak { color: #ff9500; }
        .coins { color: var(--gold); }

        /* NAVIGATION MODES */
        .mode-picker { 
            display: flex; gap: 10px; padding: 10px 20px; overflow-x: auto; 
            background: var(--surface); border-bottom: 1px solid #222;
        }
        .mode-btn { 
            padding: 8px 16px; border-radius: 12px; font-size: 11px; font-weight: 700;
            border: 1px solid #333; color: var(--sub); text-transform: uppercase; white-space: nowrap;
        }
        .mode-btn.active { background: #fff; color: #000; border-color: #fff; transform: scale(1.05); }

        /* CHAT ENGINE */
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 85%; padding: 15px; border-radius: 20px; font-size: 15px; line-height: 1.4; animation: pop 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
        .bot { background: var(--surface); border: 1px solid #222; align-self: flex-start; border-bottom-left-radius: 4px; display: flex; gap: 12px; }
        .user { background: var(--gold); color: #000; align-self: flex-end; border-bottom-right-radius: 4px; font-weight: 700; }
        
        /* THE MASCOT VIBE */
        .avatar { font-size: 32px; filter: drop-shadow(0 0 8px var(--gold)); }

        /* INTERACTIVE BUILDER */
        .builder-card { 
            background: var(--surface); border-radius: 30px 30px 0 0; 
            padding: 20px; border-top: 1px solid #333; box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }
        .chip-group { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .chip { 
            background: #1e1e1e; padding: 12px 18px; border-radius: 15px; font-size: 14px;
            font-weight: 600; border: 1px solid #333; cursor: pointer; transition: 0.2s;
        }
        .chip:active { transform: scale(0.9); background: #333; }
        .chip.verb { border-color: var(--present); color: var(--present); }

        /* INPUT AREA */
        .input-box { 
            display: flex; background: #000; border-radius: 20px; padding: 5px 5px 5px 15px; 
            align-items: center; border: 1px solid #222;
        }
        input { flex: 1; background: transparent; border: none; color: #fff; font-size: 16px; outline: none; padding: 10px 0; }
        .send-circle { 
            width: 45px; height: 45px; background: var(--gold); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; border: none; cursor: pointer;
        }

        @keyframes pop { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <header>
        <div class="stats-row">
            <div class="stat streak">🔥 <span id="streak-val">1</span></div>
            <div class="stat coins">💰 <span id="coin-val">0</span> Kz</div>
            <div class="stat" style="color:var(--present)">LEVEL 1</div>
        </div>
        <div class="xp-bar-bg"><div id="xp-fill"></div></div>
    </header>

    <div class="mode-picker">
        <div class="mode-btn active" onclick="setMode('present', this)">Presente</div>
        <div class="mode-btn" onclick="setMode('past', this)">Passado</div>
        <div class="mode-btn" onclick="setMode('future', this)">Futuro</div>
        <div class="mode-btn" style="border-color: #ff4444;" onclick="toggleNegative()">Negativos</div>
    </div>

    <main id="chat">
        <div class="msg bot">
            <div class="avatar">🦌</div>
            <div>
                <b style="color:var(--gold)">Mestre Palanca:</b><br>
                Pronto para a lição? Vamos dominar o verbo <b>To Be</b>. Monte uma frase!
            </div>
        </div>
    </main>

    <footer class="builder-card">
        <div id="chip-container">
            <div class="chip-group" id="row-who"></div>
            <div class="chip-group" id="row-verb"></div>
            <div class="chip-group" id="row-obj"></div>
        </div>
        <div class="input-box">
            <input type="text" id="sentence-input" placeholder="Toca nas palavras..." readonly>
            <button class="send-circle" onclick="handleSend()">➔</button>
        </div>
    </footer>

    <script>
        let state = { xp: 15, coins: 0, streak: 1, mode: 'present', negative: false };
        
        const library = {
            who: ["I", "You", "He", "She", "We", "They"],
            present: ["am", "are", "is"],
            past: ["was", "were"],
            future: ["will be"],
            obj: ["happy", "hungry", "at work", "late", "ready"],
            dict: {
                "I am": "Eu sou/estou", "I was": "Eu era/estava", "I will be": "Eu serei/estarei",
                "You are": "Tu és/estás", "He is": "Ele é/está", "She is": "Ela é/está",
                "happy": "feliz", "hungry": "com fome", "ready": "pronto"
            }
        };

        function setMode(m, el) {
            state.mode = m;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            renderChips();
        }

        function toggleNegative() {
            state.negative = !state.negative;
            renderChips();
        }

        function renderChips() {
            const whoRow = document.getElementById('row-who');
            const verbRow = document.getElementById('row-verb');
            const objRow = document.getElementById('row-obj');

            whoRow.innerHTML = library.who.map(w => `<div class="chip" onclick="add('${w}')">${w}</div>`).join('');
            
            let verbs = library[state.mode];
            verbRow.innerHTML = verbs.map(v => {
                let text = state.negative ? `${v} not` : v;
                return `<div class="chip verb" onclick="add('${text}')">${text}</div>`;
            }).join('');

            objRow.innerHTML = library.obj.map(o => `<div class="chip" onclick="add('${o}')">${o}</div>`).join('');
        }

        function add(w) {
            const input = document.getElementById('sentence-input');
            input.value += (input.value ? " " : "") + w;
        }

        function handleSend() {
            const val = document.getElementById('sentence-input').value.trim();
            if(!val) return;

            // Logic: Translate based on dictionary keys
            let translation = "Frase traduzida com sucesso!";
            for(let key in library.dict) {
                if(val.includes(key)) translation = val.replace(key, library.dict[key]);
            }

            // UI Update
            const chat = document.getElementById('chat');
            chat.innerHTML += `<div class="msg user">${val}</div>`;
            
            // Stats Update
            state.coins += 25;
            state.xp += 10;
            if(state.xp > 100) state.xp = 10; // Level up reset simulation
            
            updateStats();

            setTimeout(() => {
                chat.innerHTML += `
                    <div class="msg bot">
                        <div class="avatar">🦌</div>
                        <div>
                            <small style="color:var(--sub)">TRADUÇÃO</small><br>
                            <b>${translation}</b><br>
                            <span style="color:var(--gold); font-size:11px;">+25 Kz conquistados!</span>
                        </div>
                    </div>`;
                chat.scrollTop = chat.scrollHeight;
                speak(val);
            }, 600);

            document.getElementById('sentence-input').value = "";
        }

        function updateStats() {
            document.getElementById('coin-val').innerText = state.coins;
            document.getElementById('xp-fill').style.width = state.xp + "%";
        }

        function speak(t) {
            window.speechSynthesis.cancel();
            let m = new SpeechSynthesisUtterance(t);
            m.lang = 'en-US';
            window.speechSynthesis.speak(m);
        }

        renderChips();
    </script>
</body>
</html>
