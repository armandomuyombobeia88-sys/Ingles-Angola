<script>
    // This is our "Smart Brain" - we can keep adding thousands of words here!
    var dicionario = {
        "the": "o ou a", "be": "ser ou estar", "to": "para", "of": "de", "and": "e",
        "a": "um", "in": "dentro de", "that": "que", "have": "ter", "i": "eu",
        "it": "isto", "for": "por", "not": "não", "on": "sobre", "with": "com",
        "he": "ele", "she": "ela", "you": "você", "do": "fazer", "is": "é",
        "we": "nós", "they": "eles", "book": "livro", "water": "água", "friend": "amigo"
    };

    // This function handles the "Switching" of voices
    function falar(texto, lingua) {
        var msg = new SpeechSynthesisUtterance(texto);
        
        if (lingua === "en") {
            msg.lang = 'en-US';
            msg.rate = 0.8; // American Teacher speed
        } else {
            msg.lang = 'pt-PT'; // Portuguese (European/Angolan style)
            msg.rate = 1.0; 
        }
        
        window.speechSynthesis.speak(msg);
    }

    function processar() {
        var campo = document.getElementById("words");
        var tela = document.getElementById("chat");
        var inputOriginal = campo.value.trim();
        var texto = inputOriginal.toLowerCase();

        if (texto === "") return;

        // 1. Show User Input
        tela.innerHTML += "<div class='user'>Tu: " + inputOriginal + "</div>";

        // 2. Clear old speech
        window.speechSynthesis.cancel();

        // 3. LOGIC: Is the user asking "What is...?" (O que é...?)
        var respostaEN = "";
        var respostaPT = "";

        var palavras = texto.split(" ");
        var encontrados = [];

        for (var i = 0; i < palavras.length; i++) {
            var p = palavras[i];
            if (dicionario[p]) {
                encontrados.push(p.toUpperCase() + " significa " + dicionario[p]);
            }
        }

        if (encontrados.length > 0) {
            respostaEN = "Great job!";
            respostaPT = "Muito bem! " + encontrados.join(". ");
        } else {
            respostaEN = "I am listening.";
            respostaPT = "Eu estou a ouvir. Tenta usar palavras básicas.";
        }

        // 4. DISPLAY & SPEAK
        tela.innerHTML += "<div class='bot'>Teacher: " + respostaEN + "<br><small>" + respostaPT + "</small></div>";

        // Speak English First, then Portuguese!
        falar(respostaEN, "en");
        
        // Wait a small moment then speak Portuguese
        setTimeout(function() {
            falar(respostaPT, "pt");
        }, 1500);

        // Cleanup
        campo.value = "";
        tela.scrollTop = tela.scrollHeight;
    }
</script>
