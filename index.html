<script>
    // Two-Way Dictionary
    var dicionario = {
        "the": "o/a", "be": "ser/estar", "to": "para", "of": "de", "and": "e",
        "a": "um", "in": "em", "that": "que", "have": "ter", "i": "eu",
        "it": "isto", "for": "por", "not": "não", "on": "sobre", "with": "com",
        "he": "ele", "as": "como", "you": "você", "do": "fazer", "at": "em",
        "this": "este", "but": "mas", "his": "dele", "by": "por", "from": "de",
        "they": "eles", "we": "nós", "say": "dizer", "her": "dela", "she": "ela",
        "or": "ou", "an": "um", "will": "será", "my": "meu", "one": "um",
        "all": "tudo", "would": "seria", "there": "lá", "their": "deles", "what": "o que",
        "so": "então", "up": "cima", "out": "fora", "if": "se", "about": "sobre",
        "who": "quem", "get": "pegar", "which": "qual", "go": "ir", "me": "mim",
        "work": "trabalhar", "speak": "falar", "learn": "aprender", "write": "escrever"
    };

    function falarTudo() {
        var campo = document.getElementById("words");
        var tela = document.getElementById("chat");
        var input = campo.value.trim().toLowerCase();

        if (input === "") return;

        tela.innerHTML += "<div class='user'>Tu: " + input + "</div>";

        var respostaEN = "";
        var respostaPT = "";
        var encontrouTradução = false;

        // 1. Check if input is ENGLISH (Find Portuguese)
        if (dicionario[input]) {
            respostaEN = "The translation is:";
            respostaPT = input.toUpperCase() + " em Português é: " + dicionario[input];
            encontrouTradução = true;
        } 
        
        // 2. Check if input is PORTUGUESE (Find English)
        else {
            for (var eng in dicionario) {
                if (dicionario[eng] === input) {
                    respostaEN = "In English we say: " + eng.toUpperCase();
                    respostaPT = "Muito bem! " + input.toUpperCase() + " em Inglês é " + eng.toUpperCase();
                    encontrouTradução = true;
                    break;
                }
            }
        }

        // 3. If word not found
        if (!encontrouTradução) {
            respostaEN = "I am still learning that word.";
            respostaPT = "Ainda estou a aprender essa palavra. Tenta outra!";
        }

        // Display
        tela.innerHTML += "<div class='bot'><b>Teacher:</b> " + respostaEN + "<br><small>" + respostaPT + "</small></div>";

        // Voice
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            var m1 = new SpeechSynthesisUtterance(respostaEN);
            m1.lang = 'en-US'; m1.rate = 0.8;
            window.speechSynthesis.speak(m1);

            var m2 = new SpeechSynthesisUtterance(respostaPT);
            m2.lang = 'pt-PT'; m2.rate = 1.0;
            window.speechSynthesis.speak(m2);
        }

        campo.value = "";
        tela.scrollTop = tela.scrollHeight;
    }
</script>
