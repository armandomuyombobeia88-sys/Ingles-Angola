<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mestre AI - Elite Lesson 2</title>
    <style>
        :root { --gold: #ffd700; --dark: #050505; --surface: #121212; --accent: #00ffcc; --blue: #3498db; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; transition: 0.3s; }
        body { background: var(--dark); color: white; margin: 0; overflow: hidden; height: 100vh; }

        /* ELITE HOME SCREEN */
        #home-screen {
            position: fixed; inset: 0; z-index: 1000;
            background: radial-gradient(circle at top right, #1a1a1a, #000);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 20px;
        }
        .boss-title {
            font-size: 42px; font-weight: 900; color: var(--gold);
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.4); margin: 0;
            letter-spacing: -1px; line-height: 1;
        }
        .welcome-tag { color: var(--accent); font-weight: bold; letter-spacing: 3px; font-size: 12px; margin-bottom: 30px; }
        
        .lesson-card {
            width: 90%; max-width: 350px; background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1); padding: 25px; border-radius: 30px;
            backdrop-filter: blur(20px); box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .start-btn {
            background: var(--gold); color: #000; border: none; padding: 18px 40px;
            border-radius: 20px; font-weight: 900; font-size: 16px; width: 100%;
            cursor: pointer; box-shadow: 0 10px 20px rgba(255, 215, 0, 0.2);
        }

        /* APP INTERFACE */
        #app { display: none; flex-direction: column; height: 100vh; opacity: 0; }
        header { padding: 15px 20px; background: #000; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        
        /* BUILDER SECTION */
        .builder { background: var(--surface); border-radius: 30px 30px 0 0; padding: 15px; border-top: 1px solid #333; overflow-y: auto; flex-shrink: 0; max-height: 60vh; }
        .row-label { font-size: 10px; color: #666; text-transform: uppercase; margin: 15px 0 5px 5px; font-weight: 800; }
        .chip-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; scrollbar-width: none; }
        .chip-scroll::-webkit-scrollbar { display: none; }
        .chip { background: #1a1a1a; padding: 10px 16px; border-radius: 12px; border: 1px solid #333; white-space: nowrap; cursor: pointer; font-size: 13px; color: #ccc; }
        .chip:active { background: var(--gold); color: #000; }
        .chip.adj { border-color: var(--blue); color: var(--blue); }

        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 80%; padding: 15px; border-radius: 20px; font-size: 15px; animation: pop 0.3s forwards; }
        .bot { background: #1a1a1a; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #333; }
        .user { background: var(--gold); color: #000; align-self: flex-end; border-bottom-right-radius: 2px; font-weight: bold; }

        .input-box { display: flex; gap: 10px; background: #000; padding: 10px; border-radius: 20px; border: 1px solid #333; margin-top: 10px; }
        input { flex: 1; background: transparent; border: none; color: white; outline: none; }
        
        @keyframes pop { from { opacity:0; transform: scale(0.9); } to { opacity:1; transform: scale(1); } }
    </style>
</head>
<body>

    <div id="home-screen">
        <div class="welcome-tag">BEM-VINDO, BOSS</div>
        <h1 class="boss-title">MESTRE AI<br>ELITE ACADEMY</h1>
        <p style="color: #888; margin-top: 10px;">Your English empire starts here. 🇦🇴</p>
        <div style="height: 40px;"></div>
        <div class="lesson-card">
            <h3 style="margin: 0; color: var(--gold);">LESSON 02</h3>
            <p style="font-size: 14px; color: #ccc;">The 7 Types of Adjectives & Family Expansion</p>
            <button class="start-btn" onclick="startApp()">START MISSION</button>
        </div>
    </div>

    <div id="app">
        <header>
            <div style="font-weight: 800; color: var(--gold);">💰 <span id="coins">500</span> Kz</div>
            <div style="font-weight: 800; color: var(--accent);">🔥 STREAK: 1</div>
        </header>

        <div id="chat">
            <div class="msg bot">
                <b>Mestre Palanca:</b> 🦌<br>
                Welcome back! Lesson 2 is huge. We have <b>Adjectives</b> (colors, sizes, opinions) and <b>Family</b>. Build a sentence!
            </div>
        </div>

        <div class="builder">
            <div id="categories-container"></div>
            
            <div class="input-box">
                <input type="text" id="words-in" placeholder="..." readonly>
                <button onclick="send()" style="background:var(--gold); border:none; border-radius:15px; padding:0 20px; font-weight:bold;">➔</button>
            </div>
        </div>
    </div>

    <script>
        const vocab = {
            "Family (Família)": ["My father", "My mother", "My brother", "My sister", "My uncle", "My aunt", "My cousin"],
            "Verb To Be": ["is", "is not", "are", "are not", "was", "will be"],
            "Colors (Cores)": ["red", "blue", "green", "yellow", "black", "white", "purple"],
            "Feelings (Sentimentos)": ["proud", "confused", "excited", "brave", "calm", "lonely"],
            "Weather (Tempo)": ["hot", "cold", "sunny", "rainy", "windy", "cloudy"],
            "Opinion (Opinião)": ["beautiful", "expensive", "smart", "funny", "strange"],
            "Size (Tamanho)": ["huge", "tiny", "short", "tall", "wide"]
        };

        const translations = {
            "father": "pai", "mother": "mãe", "brother": "irmão", "sister": "irmã",
            "is": "é/está", "are": "são/estão", "red": "vermelho", "blue": "azul",
            "proud": "orgulhoso", "hot": "quente", "cold": "frio", "huge": "gigante"
        };

        function startApp() {
            document.getElementById('home-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('home-screen').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                document.getElementById('app').style.opacity = '1';
                renderChips();
            }, 300);
        }

        function renderChips() {
            const container = document.getElementById('categories-container');
            for (let cat in vocab) {
                container.innerHTML += `<div class="row-label">${cat}</div>`;
                let row = document.createElement('div');
                row.className = "chip-scroll";
                vocab[cat].forEach(word => {
                    row.innerHTML += `<div class="chip" onclick="add('${word}')">${word}</div>`;
                });
                container.appendChild(row);
            }
        }

        function add(w) { 
            let i = document.getElementById('words-in');
            i.value += (i.value ? " " : "") + w; 
        }

        function send() {
            const val = document.getElementById('words-in').value;
            if(!val) return;
            
            let chat = document.getElementById('chat');
            chat.innerHTML += `<div class="msg user">${val}</div>`;
            
            // Artificial "Smart" translation
            let ptParts = val.toLowerCase().split(" ").map(w => translations[w] || w);
            let pt = ptParts.join(" ");

            setTimeout(() => {
                chat.innerHTML += `<div class="msg bot"><b>Mestre:</b> ${pt}<br><small style="color:var(--gold)">+50 Kz EARNED</small></div>`;
                chat.scrollTop = chat.scrollHeight;
                speak(val);
            }, 500);

            document.getElementById('words-in').value = "";
        }

        function speak(t) {
            window.speechSynthesis.cancel();
            let m = new SpeechSynthesisUtterance(t);
            m.lang = 'en-US';
            window.speechSynthesis.speak(m);
        }
    </script>
</body>
</html>
