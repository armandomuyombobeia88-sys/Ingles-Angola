<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Angola AI Teacher Pro</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #0b141a; margin: 0; display: flex; flex-direction: column; height: 100vh; color: white; }
        .header { background: #202c33; padding: 15px; border-bottom: 1px solid #333; text-align: center; }
        .voice-row { display: flex; gap: 10px; justify-content: center; margin-top: 10px; }
        .v-btn { background: #333; border: 1px solid #00a884; color: white; padding: 6px 15px; border-radius: 20px; font-size: 0.8rem; }
        .v-btn.active { background: #00a884; font-weight: bold; }
        
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 90px; }
        .m { max-width: 85%; padding: 12px; border-radius: 15px; line-height: 1.4; animation: fadeIn 0.2s; }
        .bot { background: #202c33; align-self: flex-start; border-bottom-left-radius: 2px; }
        .user { background: #005c4b; align-self: flex-end; border-bottom-right-radius: 2px; }
        
        .input-area { position: fixed; bottom: 0; width: 100%; background: #202c33; padding: 10px; display: flex; gap: 8px; box-sizing: border-box; }
        input { flex: 1; background: #2a3942; border: none; padding: 12px; border-radius: 25px; color: white; font-size: 16px; outline: none; }
        button { background: #00a884; border: none; width: 45px; height: 45px; border-radius: 50%; color: white; font-weight: bold; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="header">
    <div style="font-weight: bold; color: #00a884;">ENGLISH TEACHER AI 🇦🇴</div>
    <div class="voice-row">
        <div class="v-btn active" id="btn-us" onclick="setV('en-US')">🇺🇸 USA</div>
        <div class="v-btn" id="btn-uk" onclick="setV('en-GB')">🇬🇧 UK</div>
    </div>
</div>

<div id="chat-box">
    <div class="m bot">Ready for class, brother! Type in Portuguese or English (Try: Hello, Good morning, or Fome).</div>
</div>

<div class="input-area">
    <input type="text" id="in" placeholder="Chat with me..." onkeypress="if(event.key==='Enter') send()">
    <button onclick="send()">></button>
</div>

<script>
    let currentVoice = 'en-US';

    // THIS IS YOUR BRAIN - Add as many as you want!
    const dictionary = [
        { pt: "bom dia", en: "Good morning!", note: "Use until 12:00 PM." },
        { pt: "hello", en: "Hello! How can I help you?", note: "Standard greeting." },
        { pt: "hi", en: "Hi there! What's up?", note: "Informal greeting." },
        { pt: "como estas", en: "How are you?", note: "Response: I am fine, thank you!" },
        { pt: "how are you", en: "I am doing great, and you?", note: "Ask back: And you?" },
        { pt: "obrigado", en: "Thank you!", note: "Polite way to say thanks." },
        { pt: "fome", en: "I am hungry", note: "Time to eat some funge!" },
        { pt: "estamos juntos", en: "We are together!", note: "The Angolan way! 🇦🇴" },
        { pt: "ajuda", en: "Can you help me?", note: "Asking for assistance." }
    ];

    function setV(v) {
        currentVoice = v;
        document.getElementById('btn-us').className = v === 'en-US' ? 'v-btn active' : 'v-btn';
        document.getElementById('btn-uk').className = v === 'en-GB' ? 'v-btn active' : 'v-btn';
    }

    function send() {
        let input = document.getElementById('in');
        let val = input.value.trim();
        if(!val) return;

        addMsg(val, 'user');
        input.value = "";

        setTimeout(() => {
            let msg = val.toLowerCase();
            // This line finds the word even if it's inside a longer sentence!
            let found = dictionary.find(d => msg.includes(d.pt) || msg.includes(d.en.toLowerCase()));

            if(found) {
                let response = "🇺🇸 " + found.en + "\n\n💡 " + found.note;
                addMsg(response, 'bot');
                speak(found.en);
            } else {
                addMsg("I haven't learned that one yet, brother! Tell me on WhatsApp and I will learn it tonight. Try 'Hello' or 'Bom dia'.", 'bot');
            }
        }, 500);
    }

    function addMsg(t, s) {
        let d = document.createElement('div');
        d.className = 'm ' + s;
        d.innerText = t;
        let box = document.getElementById('chat-box');
        box.appendChild(d);
        box.scrollTop = box.scrollHeight;
    }

    function speak(t) {
        let s = new SpeechSynthesisUtterance(t);
        s.lang = currentVoice;
        s.rate = 0.85; // Natural speed
        window.speechSynthesis.speak(s);
    }
</script>

</body>
</html>
