<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mestre AI Angola</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; margin: 0; padding: 10px; height: 100vh; display: flex; flex-direction: column; }
        #chat { flex-grow: 1; border: 2px solid #ffd700; border-radius: 10px; padding: 10px; overflow-y: auto; background: #1e1e1e; margin-bottom: 10px; }
        .bot { color: #00ffcc; margin-bottom: 15px; font-size: 16px; border-left: 3px solid #ffd700; padding-left: 10px; }
        .user { color: #ffffff; margin-bottom: 15px; text-align: right; font-weight: bold; }
        .controls { display: flex; gap: 5px; padding-bottom: 10px; }
        input { flex: 1; padding: 15px; border-radius: 8px; border: none; font-size: 16px; background: #333; color: white; outline: none; }
        button { padding: 15px; background: #ffd700; border: none; border-radius: 8px; font-weight: bold; color: black; }
    </style>
</head>
<body>

    <h3 style="text-align:center; color:#ffd700; margin: 5px;">Mestre AI 🇦🇴🇬🇧</h3>
    
    <div id="chat">
        <div class="bot"><b>Teacher:</b> Hello! I am ready. Type 'Lesson 1' or ask me a word like 'Carro' or 'Work'!</div>
    </div>

    <div class="controls">
        <input type="text" id="words" placeholder="Escreva aqui...">
        <button onclick="processar()">SEND</button>
    </div>

    <script>
        // --- THE BIG LIBRARY ---
        // You can add 1000s of words here in the same format
        var biblioteca = {
            "hello": "Olá", "hi": "Oi", "ok": "Está bem / Ok", "yes": "Sim", "no": "Não",
            "thanks": "Obrigado", "teacher": "Professor", "student": "Aluno",
            "work": "Trabalhar", "eat": "Comer", "sleep": "Dormir", "drink": "Beber",
            "run": "Correr", "walk": "Andar", "speak": "Falar", "learn": "Aprender",
            "book": "Livro", "car": "Carro", "water": "Água", "friend": "Amigo",
            "house": "Casa", "family": "Família", "school": "Escola", "money": "Dinheiro",
            "i am": "Eu sou / Eu estou", "i have": "Eu tenho", "you are": "Você é",
            "good morning": "Bom dia", "good night": "Boa noite", "please": "Por favor"
        };

        function falar(txt) {
            window.speechSynthesis.cancel();
            var msg = new SpeechSynthesisUtterance(txt);
            msg.lang = 'en-US'; msg.rate = 0.8;
            window.speechSynthesis.speak(msg);
        }

        function processar() {
            var campo = document.getElementById("words");
            var tela = document.getElementById("chat");
            var inputRaw = campo.value.trim();
            var input = inputRaw.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"");

            if (input === "") return;
            tela.innerHTML += "<div class='user'>" + inputRaw + "</div>";

            var resEN = ""; var resPT = ""; var encontrou = false;

            // 1. Check Lessons First
            if (input.includes("lesson 1") || input.includes("licao 1")) {
                resEN = "Lesson 1: Greetings. Say 'Hello' or 'Good morning'.";
                resPT = "Lição 1: Saudações. Diz 'Hello' ou 'Good morning'.";
                encontrou = true;
            } 
            else if (input === "ok") {
                resEN = "Great! Let's keep going. Type a word to translate.";
                resPT = "Ótimo! Vamos continuar. Escreve uma palavra para traduzir.";
                encontrou = true;
            }

            // 2. Search the Big Library (Automatic English/Portuguese check)
            if (!encontrou) {
                // Check if input is English Key
                if (biblioteca[input]) {
                    resEN = "The translation of " + input.toUpperCase() + " is " + biblioteca[input];
                    resPT = "A tradução de " + input.toUpperCase() + " é " + biblioteca[input];
                    encontrou = true;
                } else {
                    // Check if input is Portuguese Value
                    for (var eng in biblioteca) {
                        if (biblioteca[eng].toLowerCase().includes(input)) {
                            resEN = "In English we say: " + eng.toUpperCase();
                            resPT = "Em Inglês dizemos: " + eng.toUpperCase();
                            encontrou = true;
                            break;
                        }
                    }
                }
            }

            // 3. Default if nothing found
            if (!encontrou) {
                resEN = "I don't know that word yet, but I am learning!";
                resPT = "Ainda não conheço essa palavra, mas estou a aprender!";
            }

            tela.innerHTML += "<div class='bot'><b>Teacher:</b> " + resEN + "<br><small>" + resPT + "</small></div>";
            falar(resEN);
            campo.value = "";
            tela.scrollTop = tela.scrollHeight;
        }
    </script>
</body>
</html>
