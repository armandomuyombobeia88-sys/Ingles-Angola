<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mestre AI - Cinematic Elite</title>
    <style>
        :root { --gold: #ffd700; --dark: #050505; --accent: #00ffcc; --legendary: #ff00ff; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        body { background: var(--dark); color: white; margin: 0; overflow: hidden; height: 100vh; }

        /* INTRO OVERLAY */
        #intro-overlay {
            position: fixed; inset: 0; z-index: 9999; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .intro-text { 
            font-size: 14px; letter-spacing: 8px; color: var(--gold); 
            text-transform: uppercase; animation: glow 2s infinite alternate; 
        }
        .word-loader { 
            font-size: 40px; font-weight: 900; margin-top: 20px; 
            background: linear-gradient(to right, #fff, var(--gold));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .progress-bar { width: 200px; height: 2px; background: #222; margin-top: 40px; position: relative; overflow: hidden; }
        .progress-fill { position: absolute; left: 0; top: 0; height: 100%; background: var(--gold); width: 0%; transition: width 4s linear; }

        /* NEURAL PARTICLES (COOL STUFF) */
        .particle { position: absolute; width: 2px; height: 2px; background: var(--accent); border-radius: 50%; opacity: 0.3; }

        /* THE NEW HOME MENU */
        #home-menu {
            display: none; height: 100vh; flex-direction: column;
            background: radial-gradient(circle at top right, #1a1a00, #000);
            padding: 40px 20px; text-align: center; opacity: 0; transform: translateY(20px);
        }
        .boss-card {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,215,0,0.2);
            border-radius: 30px; padding: 30px; margin-top: 50px;
            backdrop-filter: blur(15px); box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .menu-btn {
            width: 100%; padding: 18px; margin-top: 15px; border-radius: 15px;
            border: none; font-weight: 900; font-size: 16px; letter-spacing: 1px;
            cursor: pointer; position: relative; overflow: hidden;
        }
        .btn-gold { background: var(--gold); color: black; box-shadow: 0 10px 20px rgba(255,215,0,0.2); }
        .btn-dark { background: #111; color: white; border: 1px solid #333; }

        @keyframes glow { from { opacity: 0.4; } to { opacity: 1; } }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
    </style>
</head>
<body onload="runIntro()">

    <div id="intro-overlay">
        <div class="intro-text">Synchronizing Language</div>
        <div id="loader-word" class="word-loader">BOSS</div>
        <div class="progress-bar"><div id="p-fill" class="progress-fill"></div></div>
        <div style="margin-top: 20px; font-size: 10px; color: #444;">ESTABLISHING NEURAL CONNECTION...</div>
    </div>

    <div id="home-menu">
        <div style="font-size: 12px; letter-spacing: 4px; color: var(--accent); font-weight: 800;">ANGOLA ELITE</div>
        <h1 style="font-size: 45px; margin: 10px 0; font-weight: 900; color: #fff;">MESTRE <span style="color:var(--gold)">AI</span></h1>
        
        <div class="boss-card">
            <div style="font-size: 50px; margin-bottom: 10px; animation: float 3s infinite ease-in-out;">⚪🦁</div>
            <div style="font-size: 20px; font-weight: 900;">ALBINO KING STATUS</div>
            <p style="font-size: 12px; color: #888; margin-bottom: 25px;">You have 5,400 Kz ready for investment.</p>
            
            <button class="menu-btn btn-gold" onclick="enterMap()">START MISSION</button>
            <button class="menu-btn btn-dark" onclick="openShop()">THE PALANCA SHOP</button>
            <button class="menu-btn btn-dark" onclick="openRealEstate()">MY PROPERTIES</button>
        </div>

        <div style="margin-top: auto; font-size: 10px; color: #444;">VERSION 4.0 // LUANDA CORE</div>
    </div>

    <script>
        // CINEMATIC ONBOARDING LOGIC
        const bossWords = ["POWER", "KNOWLEDGE", "EMPIRE", "FREEDOM"];
        let wordIdx = 0;

        function runIntro() {
            // Particle effect for that "High End" feel
            createParticles();

            // Word cycling
            const interval = setInterval(() => {
                document.getElementById('loader-word').innerText = bossWords[wordIdx];
                wordIdx++;
                if(wordIdx >= bossWords.length) wordIdx = 0;
            }, 800);

            // Progress Bar
            setTimeout(() => { document.getElementById('p-fill').style.width = "100%"; }, 100);

            // Transition to Menu
            setTimeout(() => {
                clearInterval(interval);
                const intro = document.getElementById('intro-overlay');
                intro.style.opacity = "0";
                intro.style.transform = "scale(1.2)";
                
                setTimeout(() => {
                    intro.style.display = "none";
                    const menu = document.getElementById('home-menu');
                    menu.style.display = "flex";
                    setTimeout(() => {
                        menu.style.opacity = "1";
                        menu.style.transform = "translateY(0)";
                    }, 50);
                }, 600);
            }, 4500);
        }

        function createParticles() {
            for(let i=0; i<30; i++) {
                let p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.top = Math.random() * 100 + 'vh';
                document.getElementById('intro-overlay').appendChild(p);
            }
        }

        // NAVIGATION PLACEHOLDERS
        function enterMap() { alert("Entering Luanda Map..."); }
        function openShop() { alert("Palanca Shop Loading..."); }
        function openRealEstate() { alert("Viewing your Kilamba T3..."); }
    </script>
</body>
</html>
