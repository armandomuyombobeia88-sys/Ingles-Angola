<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Angola English Teacher</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #0b141a; margin: 0; display: flex; flex-direction: column; height: 100vh; color: white; overflow: hidden; }
        .stats { background: #202c33; padding: 10px; display: flex; justify-content: space-between; border-bottom: 1px solid #333; font-size: 0.8rem; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 100px; }
        .m { max-width: 85%; padding: 12px; border-radius: 15px; line-height: 1.4; animation: fadeIn 0.2s; }
        .bot { background: #202c33; align-self: flex-start; border-top-left-radius: 0; border-left: 3px solid #d81e05; }
        .user { background: #005c4b; align-self: flex-end; border-top-right-radius: 0; }
        .input-area { position: fixed; bottom: 0; width: 100%; background: #202c33; padding: 15px; display: flex; gap: 10px; box-sizing: border-box; }
        input { flex: 1; background: #2a3942; border: none; padding: 15px; border-radius: 25px; color: white; font-size: 16px; outline: none; }
        button { background: #f8d800; border: none; width: 50px; height: 50px; border-radius: 50%; color: black; font-weight: bold; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="stats">
    <span>Lvl 1 Teacher 🇦🇴</span>
    <span id="xp-tag">0 XP</span>
</div>

<div id="chat-box">
    <div class="m bot"><b>Ready, Brother!</b> The bot is fixed. Type any word to start, or send me your <b>Verb to Be</b> lesson!</div>
</div>

<div class="input-area">
    <input type="text" id="in" placeholder="Type here..." onkeypress="if(event.key==='Enter') send()">
    <button onclick="send()">></button>
</div>

<script>
    let xp = 0;

    const dictionary = [
        { pt: "ser", en: "Be", tip: "I am, You are, He is." },
        { pt: "ter", en: "Have", tip: "I have a phone." },
        { pt: "fazer", en: "Do", tip: "I do my work." },
        { pt: "dizer", en: "Say", tip: "Say hello!" },
        { pt: "ir", en: "Go", tip: "Go to school." },
        { pt: "obrigado", en: "Thank you", tip: "Very polite." },
        { pt: "estamos juntos", en: "We are together", tip: "Angolan style!" },
        { pt: "bom dia", en: "Good morning", tip: "Greeting." },
        { pt: "fome", en: "Hungry", tip: "Want to eat." },
        { pt: "ajuda", en: "Help", tip: "I need help." }
        // We will add the other 90 words once we verify this works!
    ];

    function send() {
        let input = document.getElementById('in');
        let val = input.value.trim();
        if(!val) return;

        addMsg(val, 'user');
        input.value = "";

        setTimeout(() => {
            let msg = val.toLowerCase();
            let found = dictionary.find(d => msg.includes(d.pt) || msg.includes(d.en.toLowerCase()));

            if(found) {
                addMsg("🇺🇸 <b>" + found.en + "</b><br><br>💡 " + found.tip, 'bot');
                speak(found.en);
                xp += 10;
                document.getElementById('xp-tag').innerText = xp + " XP";
            } else {
                addMsg("I'm learning this one! Send me your Verb to Be lesson so I can teach better.", 'bot');
            }
        }, 500);
    }

    function addMsg(t, s) {
        let d = document.createElement('div');
        d.className = 'm ' + s;
        d.innerHTML = t;
        let box = document.getElementById('chat-box');
        box.appendChild(d);
        box.scrollTop = box.scrollHeight;
    }

    function speak(t) {
        let s = new SpeechSynthesisUtterance(t);
        s.lang = 'en-US';
        window.speechSynthesis.speak(s);
    }
</script>

</body>
</html>
