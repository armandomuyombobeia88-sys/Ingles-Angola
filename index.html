<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Professor AI Pro</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #0b141a; margin: 0; display: flex; flex-direction: column; height: 100vh; color: white; }
        .header { background: #202c33; padding: 15px; border-bottom: 1px solid #333; z-index: 10; }
        .voice-row { display: flex; gap: 8px; margin-top: 10px; justify-content: center; }
        .v-btn { background: #333; border: 1px solid #00a884; color: white; font-size: 0.75rem; padding: 8px 12px; border-radius: 20px; }
        .v-btn.active { background: #00a884; font-weight: bold; }
        
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 100px; }
        .m { max-width: 80%; padding: 12px; border-radius: 15px; font-size: 1rem; line-height: 1.4; animation: slide 0.2s ease-out; }
        .bot { background: #202c33; align-self: flex-start; border-bottom-left-radius: 2px; }
        .user { background: #005c4b; align-self: flex-end; border-bottom-right-radius: 2px; }
        
        .input-area { position: fixed; bottom: 0; width: 100%; background: #202c33; padding: 12px; display: flex; gap: 8px; box-sizing: border-box; }
        input { flex: 1; background: #2a3942; border: none; padding: 14px; border-radius: 25px; color: white; outline: none; font-size: 16px; }
        button.send { background: #00a884; border: none; width: 50px; height: 50px; border-radius: 50%; color: white; font-size: 1.5rem; }

        @keyframes slide { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

<div class="header">
    <div style="text-align: center; font-weight: bold; color: #00a884;">ENGLISH TEACHER AI 🇦🇴</div>
    <div class="voice-row">
        <div class="v-btn active" onclick="setV('en-US', this)">🇺🇸 USA</div>
        <div class="v-btn" onclick="setV('en-GB', this)">🇬🇧 UK</div>
    </div>
</div>

<div id="chat-box">
    <div class="m bot">Olá brother! Escreve em Português para traduzir, ou em Inglês para eu corrigir a tua pronúncia!</div>
</div>

<div class="input-area">
    <input type="text" id="in" placeholder="Diz algo..." onkeypress="if(event.key==='Enter') send()">
    <button class="send" onclick="send()">></button>
</div>

<script>
    let currentVoice = 'en-US';
    
    // O cérebro agora entende PT e EN!
    const dictionary = [
        { pt: "bom dia", en: "Good morning", info: "Usa de manhã." },
        { pt: "como estas", en: "How are you?", info: "Forma padrão de cumprimentar." },
        { pt: "obrigado", en: "Thank you", info: "Muito formal. Podes dizer 'Thanks'." },
        { pt: "estamos juntos", en: "We are together", info: "A nossa gíria favorita!" },
        { pt: "fome", en: "I am hungry", info: "Preciso de comer!" },
        { pt: "how are you", en: "How are you?", info: "Correto! Resposta: 'I am fine, thank you!'" },
        { pt: "hello", en: "Hello!", info: "Oi! Olá!" }
    ];

    function setV(v, el) {
        currentVoice = v;
        document.querySelectorAll('.v-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    function send() {
        let input = document.getElementById('in');
        let val = input.value.trim();
        if(!val) return;

        addMsg(val, 'user');
        input.value = "";

        setTimeout(() => {
            let msg = val.toLowerCase();
            let response = "Ainda não aprendi essa frase, brother. Vou anotar para o futuro! Tenta 'Bom dia' ou 'Como estas'.";
            let found = dictionary.find(item => msg.includes(item.pt) || msg.includes(item.en.toLowerCase()));

            if(found) {
                response = `🇺🇸 **${found.en}**\n\n💡 ${found.info}`;
                speak(found.en);
            }
            addMsg(response, 'bot');
        }, 600);
    }

    function addMsg(t, s) {
        let div = document.createElement('div');
        div.className = 'm ' + s;
        div.innerText = t;
        let box = document.getElementById('chat-box');
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    function speak(text) {
        let s = new SpeechSynthesisUtterance(text);
        s.lang = currentVoice;
        s.rate = 0.85;
        window.speechSynthesis.speak(s);
    }
</script>

</body>
</html>
