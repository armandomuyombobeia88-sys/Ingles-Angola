<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Angola English Pro</title>
    <style>
        :root { --whatsapp-dark: #0b141a; --bot-bubble: #202c33; --user-bubble: #005c4b; --accent: #f8d800; --angola-red: #d81e05; }
        body { font-family: -apple-system, sans-serif; background: var(--whatsapp-dark); margin: 0; display: flex; flex-direction: column; height: 100vh; color: white; overflow: hidden; }
        
        /* Stats Bar */
        .stats-bar { background: #202c33; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; font-size: 0.8rem; }
        .xp-pill { background: var(--angola-red); padding: 4px 10px; border-radius: 10px; font-weight: bold; }

        .header { background: #202c33; padding: 10px; text-align: center; border-bottom: 1px solid #444; }
        .v-row { display: flex; gap: 8px; justify-content: center; margin-top: 8px; }
        .v-btn { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 5px 12px; border-radius: 15px; font-size: 0.7rem; }
        .v-btn.active { background: var(--accent); color: black; }

        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; padding-bottom: 100px; }
        .m { max-width: 85%; padding: 12px; border-radius: 15px; line-height: 1.4; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .bot { background: var(--bot-bubble); align-self: flex-start; border-top-left-radius: 2px; border-left: 4px solid var(--angola-red); }
        .user { background: var(--user-bubble); align-self: flex-end; border-top-right-radius: 2px; }

        .input-area { position: fixed; bottom: 0; width: 100%; background: #202c33; padding: 15px; display: flex; gap: 10px; box-sizing: border-box; }
        input { flex: 1; background: #2a3942; border: none; padding: 15px; border-radius: 30px; color: white; font-size: 16px; outline: none; }
        .send-btn { background: var(--accent); border: none; width: 50px; height: 50px; border-radius: 50%; color: black; font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="stats-bar">
    <span>Lvl 1 Teacher 👨‍🏫</span>
    <span class="xp-pill" id="xp-tag">0 XP</span>
</div>

<div class="header">
    <div style="font-weight: bold;">ANGOLA AI BOT 🇦🇴</div>
    <div class="v-row">
        <div class="v-btn active" id="us" onclick="setV('en-US','us')">🇺🇸 USA</div>
        <div class="v-btn" id="uk" onclick="setV('en-GB','uk')">🇬🇧 UK</div>
    </div>
</div>

<div id="chat-box">
    <div class="m bot"><b>Mambo, brother!</b> I'm your private English coach. Type anything or ask for the <b>"Daily Word"</b>.</div>
</div>

<div class="input-area">
    <input type="text" id="in" placeholder="Talk to me..." onkeypress="if(event.key==='Enter') send()">
    <button class="send-btn" onclick="send()">></button>
</div>

<script>
    let currentVoice = 'en-US';
    let xp = 0;

    const brain = [
        { pt: "bom dia", en: "Good morning", tip: "Use this before 12 PM." },
        { pt: "tudo bem", en: "How is it going?", tip: "Casual way to say hi." },
        { pt: "obrigado", en: "Thank you very much", tip: "Always be polite!" },
        { pt: "estamos juntos", en: "We are together", tip: "The spirit of Angola!" },
        { pt: "daily word", en: "Resilience", tip: "Means: Never giving up (Exactly like you!)" },
        { pt: "hello", en: "Hello! Ready to learn?", tip: "Answer: Yes, I am!" },
        { pt: "how are you", en: "I am doing great!", tip: "Always stay positive." }
    ];

    function setV(v, id) {
        currentVoice = v;
        document.querySelectorAll('.v-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function send() {
        let input = document.getElementById('in');
        let val = input.value.trim();
        if(!val) return;

        addMsg(val, 'user');
        input.value = "";

        setTimeout(() => {
            let msg = val.toLowerCase();
            let found = brain.find(d => msg.includes(d.pt) || msg.includes(d.en.toLowerCase()));

            if(found) {
                let response = `🇺🇸 <b>${found.en}</b><br><br>💡 ${found.tip}`;
                addMsg(response, 'bot');
                speak(found.en);
                updateXP(10);
            } else {
                addMsg("I'm still learning that one, bro! Try 'Daily Word' or 'Estamos juntos'.", 'bot');
            }
        }, 600);
    }

    function updateXP(amount) {
        xp += amount;
        document.getElementById('xp-tag').innerText = xp + " XP";
        if(xp % 50 === 0) alert("🔥 Level Up! You're crushing it!");
    }

    function addMsg(t, s) {
        let d = document.createElement('div');
        d.className = 'm ' + s;
        d.innerHTML = t;
        let box = document.getElementById('chat-box');
        box.appendChild(d);
        box.scrollTop = box.scrollHeight;
    }

    function speak(t) {
        let s = new SpeechSynthesisUtterance(t);
        s.lang = currentVoice;
        s.rate = 0.85;
        window.speechSynthesis.speak(s);
    }
</script>

</body>
</html>
