<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mestre AI - Palanca Negra</title>
    <style>
        :root { --gold: #ffd700; --dark: #050505; --card: #1a1a1a; --accent: #00ffcc; }
        * { box-sizing: border-box; transition: all 0.3s ease; }
        body { background: var(--dark); color: #eee; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; height: 100vh; }

        /* ANIMATED LOGIN SCREEN */
        #login-screen {
            position: fixed; inset: 0; background: linear-gradient(135deg, #000 0%, #1a1a1a 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200;
        }
        .palanca-logo {
            font-size: 80px; margin-bottom: 10px; filter: drop-shadow(0 0 10px var(--gold));
            animation: bounce 2s infinite ease-in-out;
        }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .login-box {
            width: 85%; max-width: 350px; background: rgba(255,255,255,0.05);
            padding: 30px; border-radius: 25px; border: 1px solid var(--gold);
            backdrop-filter: blur(15px); text-align: center;
        }
        input { 
            width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; 
            border: 1px solid #333; background: #000; color: white; outline: none;
        }
        input:focus { border-color: var(--gold); box-shadow: 0 0 10px rgba(255,215,0,0.2); }

        /* MAIN APP LAYOUT */
        #app-interface { display: none; flex-direction: column; height: 100vh; padding: 15px; opacity: 0; }
        .show { display: flex !important; animation: fadeIn 0.5s forwards; }

        #chat { flex-grow: 1; border-radius: 20px; padding: 15px; overflow-y: auto; background: #0c0c0c; border: 1px solid #222; margin-bottom: 10px; }
        
        /* MASCOT BUBBLE */
        .bot-msg { display: flex; gap: 10px; margin-bottom: 15px; align-items: flex-start; animation: slideRight 0.3s; }
        .mascot-icon { font-size: 30px; background: #222; padding: 5px; border-radius: 50%; border: 1px solid var(--gold); }
        .bubble { background: #1a1a1a; padding: 12px; border-radius: 0 15px 15px 15px; border: 1px solid #333; max-width: 80%; }
        
        .user-msg { text-align: right; color: var(--gold); margin-bottom: 15px; font-weight: bold; animation: slideLeft 0.3s; }

        .chip { 
            background: #222; padding: 10px 18px; border-radius: 12px; font-size: 14px; 
            white-space: nowrap; border: 1px solid #444; cursor: pointer;
        }
        .chip:active { background: var(--gold); color: #000; transform: scale(0.95); }

        .btn-gold { 
            background: var(--gold); color: black; border: none; padding: 15px; 
            border-radius: 15px; font-weight: 900; width: 100%; cursor: pointer; 
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideRight { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideLeft { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="palanca-logo">🦌</div> <h2 style="color: var(--gold); letter-spacing: 2px;">PALANCA MESTRE</h2>
        <div class="login-box">
            <input type="text" id="username" placeholder="Teu Nome (Your Name)">
            <input type="password" placeholder="Password">
            <button class="btn-gold" onclick="login()">ENTRAR / LOGIN</button>
        </div>
    </div>

    <div id="app-interface">
        <div id="chat" id="chat-box">
            <div class="bot-msg">
                <div class="mascot-icon">🦌</div>
                <div class="bubble"><b>Mestre Palanca:</b> Bem-vindo! Escolha as palavras abaixo para montar sua frase.</div>
            </div>
        </div>

        <div style="background: #111; border-radius: 20px; padding: 10px; margin-bottom: 10px; border: 1px solid #333;">
            <div id="chip-area"></div>
        </div>

        <div style="display: flex; gap: 10px;">
            <input type="text" id="words" placeholder="Sentence..." readonly style="margin:0;">
            <button onclick="process()" style="background:var(--gold); border:none; border-radius:12px; padding:0 20px; font-weight:bold;">SEND</button>
        </div>
    </div>

    <script>
        // Real Translation Dictionary
        const dictionary = {
            "I": "Eu", "You": "Tu", "He": "Ele", "She": "Ela", "We": "Nós",
            "am": "estou", "want": "quero", "need": "preciso", "go to": "vou para",
            "happy": "feliz", "water": "água", "work": "trabalho", "school": "escola",
            "hungry": "com fome", "now": "agora"
        };

        const words = {
            who: ["I", "You", "He", "She"],
            action: ["am", "want", "need", "go to"],
            desc: ["happy", "water", "work", "school"]
        };

        function login() {
            let user = document.getElementById('username').value || "Estudante";
            document.getElementById('login-screen').style.top = "-100%";
            document.getElementById('app-interface').classList.add('show');
            loadChips();
        }

        function loadChips() {
            const area = document.getElementById('chip-area');
            for (let cat in words) {
                let row = document.createElement('div');
                row.style.display = "flex"; row.style.gap = "8px"; row.style.overflowX = "auto"; row.style.padding = "5px 0";
                words[cat].forEach(w => {
                    row.innerHTML += `<div class="chip" onclick="add('${w}')">${w}</div>`;
                });
                area.appendChild(row);
            }
        }

        function add(w) { document.getElementById('words').value += w + " "; }

        function process() {
            let english = document.getElementById('words').value.trim();
            if(!english) return;

            // Simple Translator Logic
            let wordsArray = english.split(" ");
            let portuguese = wordsArray.map(w => dictionary[w] || w).join(" ");

            let chat = document.getElementById('chat');
            chat.innerHTML += `<div class="user-msg">${english}</div>`;
            
            setTimeout(() => {
                chat.innerHTML += `
                    <div class="bot-msg">
                        <div class="mascot-icon">🦌</div>
                        <div class="bubble">
                            <b>Mestre Palanca:</b> ${portuguese}<br>
                            <small style="color:var(--accent)">🔊 Pronunciation active</small>
                        </div>
                    </div>`;
                chat.scrollTop = chat.scrollHeight;
                speak(english);
            }, 600);

            document.getElementById('words').value = "";
        }

        function speak(t) {
            window.speechSynthesis.cancel();
            let m = new SpeechSynthesisUtterance(t);
            m.lang = 'en-US';
            window.speechSynthesis.speak(m);
        }
    </script>
</body>
</html>
