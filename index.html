<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mestre AI - Tactical Empire</title>
    <style>
        :root { 
            --gold: #ffd700; --dark: #050505; --surface: #121212; 
            --accent: #00ffcc; --legendary: #ff00ff; --blue: #0088ff;
        }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; transition: 0.3s; }
        body { background: var(--dark); color: white; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

        /* UI ELEMENTS */
        header { padding: 15px 20px; background: #000; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        #ability-bar { background: #111; padding: 10px 20px; display: flex; justify-content: space-around; border-bottom: 1px solid #333; }
        .ability-btn { background: rgba(0,255,204,0.1); border: 1px solid var(--accent); color: var(--accent); padding: 5px 15px; border-radius: 10px; font-size: 11px; font-weight: 800; cursor: pointer; }
        .ability-btn:disabled { opacity: 0.3; border-color: #444; color: #444; }

        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .bubble { max-width: 85%; padding: 15px; border-radius: 20px; line-height: 1.4; animation: pop 0.4s ease; }
        .bot { background: var(--surface); border: 1px solid #222; align-self: flex-start; border-bottom-left-radius: 2px; }
        .user { background: var(--gold); color: #000; align-self: flex-end; border-bottom-right-radius: 2px; font-weight: 800; }

        /* KILAMBA BUILDER */
        .builder { background: var(--surface); padding: 15px; border-radius: 30px 30px 0 0; border-top: 1px solid #333; max-height: 55vh; overflow-y: auto; }
        .cat-label { font-size: 10px; color: #666; text-transform: uppercase; margin: 12px 0 5px; font-weight: 900; letter-spacing: 1px; }
        .chip-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .chip { background: #111; padding: 10px 16px; border-radius: 12px; border: 1px solid #333; white-space: nowrap; cursor: pointer; font-size: 13px; color: #bbb; }
        .chip:active { background: var(--gold); color: #000; }

        .input-group { display: flex; gap: 10px; background: #000; padding: 10px; border-radius: 20px; border: 1px solid #333; margin-top: 10px; }
        input { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 16px; }
        .send-btn { background: var(--gold); border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 20px; color: black; font-weight: 900; }

        @keyframes pop { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <header>
        <div style="font-weight: 900; color: var(--gold); font-size: 18px;">💰 <span id="coins">4200</span> Kz</div>
        <div style="font-size: 28px;" id="active-mascot">🐘</div>
        <div style="color:var(--accent); font-weight:800; font-size:11px;">🏢 KILAMBA CITY</div>
    </header>

    <div id="ability-bar">
        <button class="ability-btn" id="btn-elephant" onclick="useElephant()">🛡️ ELEPHANT: SHIELD (Skip)</button>
        <button class="ability-btn" id="btn-giraffe" onclick="useGiraffe()" style="display:none;">🦒 GIRAFFE: VISION (Hint)</button>
    </div>

    <div id="chat">
        <div class="bubble bot">
            <b>Mestre:</b> 🦌<br>
            Welcome to <b>Kilamba City (Lesson 8)</b>. You are looking for an apartment. Describe your dream home!
        </div>
    </div>

    <div class="builder">
        <div class="cat-label">Apartment Search</div>
        <div class="chip-scroll" id="row-search"></div>
        <div class="cat-label">Rooms & Spaces</div>
        <div class="chip-scroll" id="row-rooms"></div>
        <div class="cat-label">Furniture</div>
        <div class="chip-scroll" id="row-items"></div>
        <div class="cat-label">Adjectives</div>
        <div class="chip-scroll" id="row-adj"></div>

        <div class="input-group">
            <input type="text" id="main-input" placeholder="Search for a T3 in Kilamba..." readonly>
            <button class="send-btn" onclick="process()">➔</button>
        </div>
    </div>

    <script>
        let coins = 4200;
        let activeMascot = 'elephant'; // Elephant is easiest/first to get
        
        const kilambaBrain = {
            "apartment": "apartamento", "rent": "alugar", "bedroom": "quarto", "kitchen": "cozinha",
            "living room": "sala", "bed": "cama", "table": "mesa", "fridge": "geleira",
            "beautiful": "bonito", "expensive": "caro", "spacious": "espaçoso"
        };

        const vocab = {
            search: ["I want to rent", "Is there a", "I am looking for", "How many", "How much is the"],
            rooms: ["apartment", "bedroom", "bathroom", "kitchen", "living room", "balcony"],
            items: ["bed", "sofa", "table", "chairs", "fridge", "stove", "air conditioner"],
            adj: ["spacious", "modern", "expensive", "cheap", "quiet", "new"]
        };

        function useElephant() {
            if(coins >= 500) {
                coins -= 500;
                document.getElementById('coins').innerText = coins;
                alert("Elephant Shield Activated! Incorrect answer penalties are blocked for this session.");
            } else { alert("Not enough Kwanza!"); }
        }

        function useGiraffe() {
            // Logic for showing answers - unlocked if user buys Giraffe
            alert("Giraffe Vision: Showing the translation for 5 seconds...");
        }

        function renderChips() {
            for(let cat in vocab) {
                document.getElementById('row-' + cat).innerHTML = vocab[cat].map(w => `<div class="chip" onclick="add('${w}')">${w}</div>`).join('');
            }
        }

        function add(w) { let i = document.getElementById('main-input'); i.value += (i.value ? " " : "") + w; }

        function process() {
            let val = document.getElementById('main-input').value.trim();
            if(!val) return;
            
            let translation = val.toLowerCase();
            for(let eng in kilambaBrain) {
                if(translation.includes(eng)) {
                    translation = translation.replace(new RegExp(eng, 'g'), `<b>${kilambaBrain[eng]}</b>`);
                }
            }

            let chat = document.getElementById('chat');
            chat.innerHTML += `<div class="user bubble">${val}</div>`;
            coins += 250;
            document.getElementById('coins').innerText = coins;

            setTimeout(() => {
                chat.innerHTML += `
                    <div class="bot bubble">
                        <small style="color:var(--accent)">KILAMBA REAL ESTATE:</small><br>
                        ${translation}<br>
                        <div style="color:var(--gold); font-size:10px; margin-top:5px;">+250 Kz EARNED!</div>
                    </div>`;
                chat.scrollTop = chat.scrollHeight;
                speak(val);
            }, 600);
            document.getElementById('main-input').value = "";
        }

        function speak(t) { window.speechSynthesis.cancel(); let m = new SpeechSynthesisUtterance(t); m.lang = 'en-US'; window.speechSynthesis.speak(m); }

        renderChips();
    </script>
</body>
</html>
